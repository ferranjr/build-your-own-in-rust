[package]
name = "url-shortener"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tokio = { version = "1.36.0", features = [ "macros", "rt-multi-thread"]}
futures = "0.3.30"
actix-web = "4.5.1"
bson = "2.9.0"
serde = "1.0.197"
serde_json = "1.0.114"
nanoid = "0.4.0"
dotenv = "0.15.0"
thiserror = "1.0.56"
anyhow = "1.0.81"
rand = "0.8.5"

[dependencies.mongodb]
version = "2.8.1"
features = ["tokio-runtime"]

[dev-dependencies]
reqwest = { version = "0.11.26", features = ["json"] }